services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:7801}
    container_name: task-hub-frontend
    restart: unless-stopped
    ports:
      - "7802:80"
    depends_on:
      app:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-hub-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 7801
      DATABASE_URL: postgresql://task_hub:task_hub_password@db:5432/task_hub?schema=public
      CORS_ORIGIN: http://localhost:7802,http://localhost:5173,https://test.slimebase.ru
    ports:
      - "7801:7801"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: task-hub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: task_hub
      POSTGRES_PASSWORD: task_hub_password
      POSTGRES_DB: task_hub
    ports:
      - "5433:5432"
    volumes:
      - task-hub-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_hub -d task_hub"]
      interval: 5s
      timeout: 5s
      retries: 10

  db_test:
    image: postgres:16-alpine
    container_name: task-hub-db-test
    restart: unless-stopped
    profiles:
      - test
    environment:
      POSTGRES_USER: task_hub
      POSTGRES_PASSWORD: task_hub_password
      POSTGRES_DB: task_hub_test
    ports:
      - "7804:5432"
    volumes:
      - task-hub-postgres-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_hub -d task_hub_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  task-hub-postgres-data:
  task-hub-postgres-test-data:

